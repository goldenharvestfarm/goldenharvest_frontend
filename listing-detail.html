<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listing Detail — Golden Harvest Farm</title>
    <link rel="stylesheet" href="index.css">
    <style>
        /* ── Detail Page ───────────────────────────── */
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
        body { background: #faf9f6; margin: 0; font-family: 'Open Sans', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
             padding-top: 0 !important;
    }



        .detail-hero {
            position: relative;
            height: 150px;
            width: 100% !important;
            overflow: hidden;
            background: #1f3d22;
        }
        
       
        .detail-hero-back {
            position: absolute;
            top: 1.5rem;
            left: 11rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #fff;
            font-size: 0.88rem;
            font-weight: 700;
            text-decoration: none;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(6px);
            border-radius: 999px;
            padding: 0.5rem 1.1rem;
            transition: background 0.2s;
            z-index: 2;
        }

        .detail-hero-back:hover { background: rgba(0,0,0,0.55); }

        .detail-hero-badge {
            position: absolute;
            bottom: 1.5rem;
            left: 11rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 2;
        }

        .detail-hero-tag {
            background: rgba(255,255,255,0.92);
            color: #2E5C32;
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.35rem 1rem;
            border-radius: 999px;
            backdrop-filter: blur(4px);
        }

        .detail-body {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2.5rem;
            align-items: start;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }

        /* Left */
      

        .detail-title {
            font-size: 2.2rem;
            font-weight: 900;
            color: #1f3d22;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .detail-location {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .detail-stat {
            background: #fff;
            border: 1px solid #ece8e0;
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
        }

        .detail-stat-label {
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #aaa;
            margin-bottom: 0.4rem;
        }

        .detail-stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: #1f3d22;
        }

        .detail-stat-value.price {
            font-size: 1.4rem;
            color: #2E5C32;
            font-family: Georgia, serif;
        }

        .detail-stat-value.health-good { color: #2E5C32; }
        .detail-stat-value.health-bad  { color: #c0392b; }

        .detail-description {
            background: #fff;
            border: 1px solid #ece8e0;
            border-radius: 14px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .detail-description h4 {
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #aaa;
            margin-bottom: 0.75rem;
        }

        .detail-description p {
            color: #555;
            font-size: 0.96rem;
            line-height: 1.8;
        }

        /* Right sidebar */


        .detail-order-card {
            background: #fff;
            border: 1px solid #ece8e0;
            border-radius: 18px;
            padding: 2rem;
            position: sticky;
            top: 2rem;
        }

        .detail-order-card .about-label {
            margin-bottom: 0.5rem;
        }

        .detail-price-big {
            font-size: 2rem;
            font-weight: 900;
            color: #2E5C32;
            font-family: Georgia, serif;
            margin-bottom: 0.3rem;
        }

        .detail-price-sub {
            font-size: 0.82rem;
            color: #aaa;
            margin-bottom: 1.5rem;
        }

        .detail-qty-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
        }

        .detail-qty-label {
            font-size: 0.82rem;
            font-weight: 700;
            color: #1f3d22;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .detail-qty-avail {
            font-size: 0.8rem;
            color: #888;
        }

        .detail-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            background: #1f3d22;
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            font-family: inherit;
            margin-top: 0.5rem;
        }

        .detail-add-btn:hover {
            background: #2E5C32;
            transform: translateY(-2px);
        }

        .detail-share-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            width: 100%;
            background: transparent;
            color: #2E5C32;
            border: 1.5px solid #c8e6c9;
            border-radius: 12px;
            padding: 0.8rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 0.75rem;
        }

        .detail-share-btn:hover {
            background: #eef4ee;
            border-color: #4A7C4E;
        }

        .detail-contact-card {
            background: #1f3d22;
            border-radius: 18px;
            padding: 1.5rem;
            margin-top: 1.2rem;
            color: #fff;
        }

        .detail-contact-card h4 {
            font-size: 0.9rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .detail-contact-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.85);
            margin-bottom: 0.6rem;
        }

        .detail-contact-item strong { color: #fff; }

        .detail-trust {
            display: flex;
            justify-content: space-between;
            margin-top: 1.2rem;
            padding-top: 1.2rem;
            border-top: 1.5px solid #f0ede8;
        }

        .detail-trust-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #aaa;
            text-align: center;
        }

        /* Loading skeleton */
        .detail-skeleton {
            background: linear-gradient(90deg, #f0ede8 25%, #e8e4de 50%, #f0ede8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 10px;
        }
        

        @keyframes shimmer {
            from { background-position: 200% 0; }
            to   { background-position: -200% 0; }
        }

        .detail-error {
            text-align: center;
            padding: 5rem 2rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .detail-error h2 {
            color: #1f3d22;
            margin-bottom: 1rem;
        }

        .detail-error p { color: #888; margin-bottom: 2rem; }

        @media (max-width: 900px) {
            .detail-body {
                grid-template-columns: 1fr;
            }
            .detail-order-card { position: static; }
            .detail-hero { height: 150px; }
            .detail-hero-back, .detail-hero-badge{
                left: 2rem;
            }
            .listing-image{
                height: 200px !important;
            }
            nav{
                padding: 1rem 5% !important;
            }
            .back-to-listing{
                display: none;
            }
        }


        @media (max-width: 540px) {
            .detail-grid { grid-template-columns: 1fr; }
            .detail-title { font-size: 1.7rem; }
             .listing-image{
                height: 200px !important;
            }
        }


        @keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>
<body>

    <main>

    <!-- Minimal Nav -->
    <nav style="background: #fff; border-bottom: 1px solid #ece8e0; padding: 1rem 12%; height: 5rem !important; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100;">
        <a href="index.html" style="display: flex; align-items: center; gap: 0.6rem; font-weight: 600; color: #1f3d22; text-decoration: none; font-size: 1.2rem;">
    <img src="images/logo_GHF-removebg-preview.png" alt="Golden Harvest Farm" style="height: 38px; width: 38px; object-fit: contain;">
    Golden Harvest Farm
</a>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <a class="back-to-listing" href="buy.html" style="font-size: 0.88rem; color: #555; text-decoration: none; font-weight: 600;">← Back to Listings</a>
            <a href="cart.html" style="position: relative; color: #1f3d22;">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                <span id="cartCount" class="cart-count">0</span>
            </a>
        </div>
    </nav>

    <!-- Hero (image filled by JS) -->
    <div class="detail-hero" id="detailHero">
        <img id="detailHeroImg" class="detail-hero-img" src="" alt="">
        <a href="buy.html" class="detail-hero-back">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>All Listings
        </a>
        <div class="detail-hero-badge" id="detailHeroBadge"></div>
    </div>

    <!-- Body (filled by JS) -->
    <div class="detail-body" id="detailBody">
        <!-- Loading state -->
        <div style="grid-column: 1/-1; padding: 4rem 0;">
            <div class="detail-skeleton" style="height: 40px; width: 60%; margin-bottom: 1rem;"></div>
            <div class="detail-skeleton" style="height: 20px; width: 30%; margin-bottom: 2rem;"></div>
            <div style="display: grid; grid-template-columns: repeat(2,1fr); gap: 1rem;">
                <div class="detail-skeleton" style="height: 80px;"></div>
                <div class="detail-skeleton" style="height: 80px;"></div>
                <div class="detail-skeleton" style="height: 80px;"></div>
                <div class="detail-skeleton" style="height: 80px;"></div>
            </div>
        </div>
    </div>

</main>

    <div id="site-footer"></div>
     <script src="js/layout.js"></script>
<script src="js/translation.js"></script>
     <script src="js/script.js"></script>
    <script src="js/cart.js"></script>

    <script>
        const params  = new URLSearchParams(window.location.search);
        const listingId = params.get('id');

        async function loadListing() {
            if (!listingId) { showError('No listing ID provided.'); return; }

            try {
                const res = await fetch(`${API_URL}/api/listings/${listingId}`);
                if (!res.ok) throw new Error('Not found');
                const data = await res.json();
const listing = data.listing; // ← unwrap it
renderListing(listing);
            } catch (err) {
                // Fallback: try from allListings if on same session
                showError('Listing not found or could not be loaded.');
            }
        }

        function renderListing(listing) {
            // Update page title
            document.title = `${listing.breed} — Golden Harvest Farm`;

            // Hero
            const heroImg = document.getElementById('detailHeroImg');
            heroImg.style.display = 'none';
            heroImg.src = listing.image;
            heroImg.alt = listing.breed;

            document.getElementById('detailHeroBadge').innerHTML = `
                <span class="detail-hero-tag">${listing.animalType}</span>
                <span class="detail-hero-tag">📍 ${listing.location}</span>
            `;

            const healthClass = listing.healthStatus?.toLowerCase().includes('good') ||
                                 listing.healthStatus?.toLowerCase().includes('healthy')
                                 ? 'health-good' : '';

            // Body
            document.getElementById('detailBody').innerHTML = `
                <!-- Left: Details -->
                <div class="detail-main">
                    <img class="listing-image" src="${listing.image}" alt="${listing.breed}" style="width: 100%; height: 400px; object-fit: cover; border-radius: 14px; margin-bottom: 1.5rem;">
                    <h1 class="detail-title">${listing.breed}</h1>
                    <div class="detail-location">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        ${listing.location}, Rwanda
                    </div>

                    <div class="detail-grid">
                        <div class="detail-stat">
                            <div class="detail-stat-label">Animal Type</div>
                            <div class="detail-stat-value">${listing.animalType}</div>
                        </div>
                        <div class="detail-stat">
                            <div class="detail-stat-label">Available Quantity</div>
                            <div class="detail-stat-value">${listing.quantity} units</div>
                        </div>
                        <div class="detail-stat">
                            <div class="detail-stat-label">Price per Unit</div>
                            <div class="detail-stat-value price">${listing.pricePerUnit.toLocaleString()} RWF</div>
                        </div>
                        <div class="detail-stat">
                            <div class="detail-stat-label">Health Status</div>
                            <div class="detail-stat-value ${healthClass}">${listing.healthStatus || 'Not specified'}</div>
                        </div>
                        ${listing.weightPerChicken ? `
                        <div class="detail-stat">
                            <div class="detail-stat-label">Avg Weight / Chicken</div>
                            <div class="detail-stat-value">${listing.weightPerChicken} kg</div>
                        </div>` : ''}
                        ${listing.weightPerGoat ? `
                        <div class="detail-stat">
                            <div class="detail-stat-label">Avg Weight / Goat</div>
                            <div class="detail-stat-value">${listing.weightPerGoat} kg</div>
                        </div>` : ''}
                    </div>

                    <div class="detail-description">
                        <h4>Description</h4>
                        <p>${listing.description || 'No description provided.'}</p>
                    </div>
                </div>

                <!-- Right: Order Sidebar -->
                <div class="detail-sidebar">
                    <div class="detail-order-card">
                        <div class="about-label">ORDER NOW</div>
                        <div class="detail-price-big">${listing.pricePerUnit.toLocaleString()} RWF</div>
                        <div class="detail-price-sub">per unit · ${listing.quantity} available</div>

                        <div class="detail-qty-row">
                            <span class="detail-qty-label">In Stock</span>
                            <span class="detail-qty-avail">${listing.quantity} ${listing.animalType}(s)</span>
                        </div>

                        <button class="detail-add-btn" data-id="${listing._id}">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
                            Add to Cart
                        </button>

                        <button class="detail-share-btn" onclick="shareListingPage()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                            Share This Listing
                        </button>

                        <div class="detail-trust">
                            <div class="detail-trust-item">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4A7C4E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                Health Certified
                            </div>
                            <div class="detail-trust-item">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4A7C4E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                                Delivery Available
                            </div>
                            <div class="detail-trust-item">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4A7C4E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
                                Farm Fresh
                            </div>
                        </div>
                    </div>

                    <div class="detail-contact-card">
                        <h4>Contact Golden Harvest Farm</h4>
                        <div class="detail-contact-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                            <strong>${listing.phone || '+250 788 000 000'}</strong>
                        </div>
                        <div class="detail-contact-item">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                            Kigali, Rwanda
                        </div>
                        <p style="font-size: 0.82rem; color: rgba(255,255,255,0.6); margin-top: 0.75rem; line-height: 1.6;">
                            Call us to inquire or arrange a farm visit.
                        </p>
                    </div>
                </div>
            `;

            // Store listing in window for addToCart
            window._currentListing = listing;

            // Bind add to cart button
            document.querySelector('.detail-add-btn').addEventListener('click', () => {
                // Inject into allListings if not present
                if (typeof allListings === 'undefined') window.allListings = [];
                if (!allListings.find(l => l._id === listing._id)) {
                    allListings.push(listing);
                }
                addToCart(listing._id);
            });
        }

        function showError(msg) {
            document.getElementById('detailBody').innerHTML = `
                <div class="detail-error" style="grid-column: 1/-1;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ddd" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1.5rem;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    <h2>Listing Not Found</h2>
                    <p>${msg}</p>
                    <a href="buy.html" style="display: inline-block; background: #1f3d22; color: #fff; padding: 0.85rem 2rem; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.92rem;">Browse All Listings</a>
                </div>
            `;
        }

        function shareListingPage() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: document.title,
                    text: 'Check out this listing on Golden Harvest Farm',
                    url
                });
            } else {
                navigator.clipboard.writeText(url).then(() => {
                    showToast('Link copied to clipboard!');
                });
            }
        }

        // Init
        initCart();
        loadListing();
        injectFooter();
    </script>
</body>
</html>
